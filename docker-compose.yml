version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wiki-db
    environment:
      POSTGRES_USER: wiki_user
      POSTGRES_PASSWORD: wiki_password
      POSTGRES_DB: wiki_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki_user -d wiki_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wiki-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: wiki-search
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wiki-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wiki-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://wiki_user:wiki_password@postgres:5432/wiki_db
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - wiki-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wiki-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - wiki-network

volumes:
  pgdata:
  esdata:

networks:
  wiki-network:
    driver: bridge
