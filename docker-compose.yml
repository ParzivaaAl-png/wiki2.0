services:
  postgres:
    image: postgres:16-alpine
    container_name: wiki-db
    environment:
      POSTGRES_USER: wiki_user
      POSTGRES_PASSWORD: wiki_password
      POSTGRES_DB: wiki_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki_user -d wiki_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wiki-network

  meilisearch:
    build:
      context: ./meilisearch
      dockerfile: Dockerfile
    image: wiki-search-local:latest
    container_name: wiki-search
    environment:
      - MEILI_HTTP_ADDR=0.0.0.0:7700
      - MEILI_HOST=0.0.0.0
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=masterKey
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/data.ms
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://127.0.0.1:7700/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - wiki-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wiki-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://wiki_user:wiki_password@postgres:5432/wiki_db
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=masterKey
      - NODE_ENV=production
      - SEED_DEMO_DATA=false
    depends_on:
      postgres:
         condition: service_healthy
      meilisearch:
         condition: service_healthy
    restart: unless-stopped
    networks:
      - wiki-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wiki-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - wiki-network

volumes:
  pgdata:
  meilidata:

networks:
  wiki-network:
    driver: bridge
