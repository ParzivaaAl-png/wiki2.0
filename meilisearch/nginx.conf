worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Log to stdout/stderr
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Set client body size limit for large index uploads
    client_max_body_size 100M;

    # Map HEAD requests to GET, keep other methods unchanged
    map $request_method $my_proxy_method {
        default $request_method;
        HEAD GET;
    }

    server {
        listen 7700;

        location / {
            proxy_pass http://127.0.0.1:7701;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable buffering for search response streaming/speed
            proxy_buffering off;
        }

        location = /health {
            proxy_pass http://127.0.0.1:7701;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_method $my_proxy_method;
        }
    }
}
