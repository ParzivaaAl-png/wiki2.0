name: Keep Alive Robot

on:
  schedule:
    - cron: '*/10 * * * *' # Run every 10 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Service
        run: |
          curl -sL -w "%{http_code}" https://wiki-backend-atnp.onrender.com/health -o /dev/null
      - name: Ping Frontend Service
        run: |
          curl -sL -w "%{http_code}" https://wiki2-frontend.vercel.app/ -o /dev/null
