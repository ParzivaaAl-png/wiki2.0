services:
  # 1. Meilisearch Web Service (Docker container)
  - type: web
    name: wiki-search
    env: docker
    dockerfilePath: meilisearch/Dockerfile
    dockerContext: meilisearch
    plan: free
    envVars:
      - key: MEILI_HOST
        value: "0.0.0.0" # Correct bind-all interface
      - key: MEILI_PORT
        value: "7700"
      - key: MEILI_NO_ANALYTICS
        value: "true"
      - key: MEILI_MASTER_KEY
        value: "superSecretMeilisearchMasterKey2026" # Production-ready key (>= 16 bytes)

  # 2. Express Backend Web Service
  - type: web
    name: wiki-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wiki-db
          property: connectionString
      - key: MEILISEARCH_HOST
        fromService:
          type: web
          name: wiki-search
          property: hostport
      - key: MEILISEARCH_API_KEY
        value: "superSecretMeilisearchMasterKey2026"

databases:
  - name: wiki-db
    databaseName: wiki_db
    user: wiki_user
    plan: free
