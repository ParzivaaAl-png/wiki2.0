services:
  # 1. Meilisearch Web Service (Docker container)
  - type: web
    name: wiki-search
    env: docker
    dockerfilePath: meilisearch/Dockerfile
    dockerContext: meilisearch
    plan: free
    envVars:
      - key: MEILI_HOST
        value: "0.0.0.5" # Listen on all interfaces inside container
      - key: MEILI_PORT
        value: "7700"
      - key: MEILI_NO_ANALYTICS
        value: "true"
      - key: MEILI_MASTER_KEY
        value: "masterKey"

  # 2. Express Backend Web Service
  - type: web
    name: wiki-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wiki-db
          property: connectionString
      - key: MEILISEARCH_HOST
        value: "http://wiki-search:7700" # Internal network connection to Meilisearch
      - key: MEILISEARCH_API_KEY
        value: "masterKey"

databases:
  - name: wiki-db
    databaseName: wiki_db
    user: wiki_user
    plan: free
