databases:
  - name: wiki-db
    databaseName: wiki_db
    user: wiki_user
    plan: free

services:
  # 1. Express Backend Web Service
  - type: web
    name: wiki-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wiki-db
          property: connectionString
      - key: MEILISEARCH_HOST
        value: "https://your-meilisearch-instance.onrender.com"
      - key: MEILISEARCH_API_KEY
        value: "your-meilisearch-api-key"

  # 2. Vite Frontend Static Site (Размещается на CDN, никогда не засыпает)
  - type: static
    name: wiki-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: "https://wiki-backend.onrender.com/api" # Замените на публичный URL вашего бэкенда на Render
