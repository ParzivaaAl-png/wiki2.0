services:
  # 1. Meilisearch Web Service (Docker container)
  - type: web
    name: wiki-search
    region: frankfurt
    env: docker
    dockerfilePath: meilisearch/Dockerfile
    dockerContext: meilisearch
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "7700" # Explicitly instruct Render to route to port 7700
      - key: MEILI_HTTP_ADDR
        value: "0.0.0.0:7700" # Bind Meilisearch to all interfaces on 7700
      - key: MEILI_HOST
        value: "0.0.0.0"
      - key: MEILI_NO_ANALYTICS
        value: "true"
      - key: MEILI_MASTER_KEY
        value: "superSecretMeilisearchMasterKey2026" # Production-ready key (>= 16 bytes)

  # 2. Express Backend Web Service
  - type: web
    name: wiki-backend
    region: frankfurt
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wiki-db
          property: connectionString
      - key: MEILI_HOST
        fromService:
          type: web
          name: wiki-search
          property: url
      - key: MEILI_MASTER_KEY
        value: "superSecretMeilisearchMasterKey2026"

databases:
  - name: wiki-db
    region: frankfurt
    databaseName: wiki_db
    user: wiki_user
    plan: free
