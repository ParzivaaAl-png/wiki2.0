databases:
  - name: wiki-db
    databaseName: wiki_db
    user: wiki_user
    plan: free

services:
  # 1. Express Backend Web Service
  - type: web
    name: wiki-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wiki-db
          property: connectionString
      - key: ELASTICSEARCH_NODE
        value: "https://your-bonsai-cluster-url.bonsai.io" # Замените на URL вашего кластера с Bonsai.io

  # 2. Next.js Frontend Web Service
  - type: web
    name: wiki-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://wiki-backend.onrender.com/api" # Замените на публичный URL вашего бэкенда на Render
      - key: INTERNAL_API_URL
        value: "https://wiki-backend.onrender.com/api"
