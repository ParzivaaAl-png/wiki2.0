services:
  # Express Backend + Meilisearch Web Service (Docker container)
  - type: web
    name: wiki-backend-combined
    region: frankfurt
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wiki-db
          property: connectionString
      - key: MEILI_HOST
        value: "http://localhost:7700"
      - key: MEILI_MASTER_KEY
        value: "superSecretMeilisearchMasterKey2026"
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: wiki-db
    region: frankfurt
    databaseName: wiki_db
    user: wiki_user
    plan: free
