services:
  # Express Backend + Meilisearch Web Service (Docker container)
  - type: web
    name: wiki-backend-combined
    region: frankfurt
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: SEED_DEMO_DATA
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: MEILI_HOST
        value: "http://localhost:7700"
      - key: MEILI_MASTER_KEY
        value: "superSecretMeilisearchMasterKey2026"
      - key: JWT_SECRET
        generateValue: true


